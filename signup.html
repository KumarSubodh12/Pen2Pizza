<!DOCTYPE html>
<html>
<head>
    <title>Signup - Pen2Pizza</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #d9f0ff, #f8fcff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #0077ff;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Create Account</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button onclick="sendOTP()">Send OTP</button>

    <input id="otp" placeholder="Enter OTP">

    <button onclick="verifyOTP()">Verify & Signup</button>

</div>

</html>
