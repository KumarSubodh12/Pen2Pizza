<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <h2 class="logo">👤 My Profile</h2>
    <a href="products.html" class="cart-btn">⬅ Back</a>
</div>

<div class="container">

    <!-- USER INFO -->
    <div class="form-box">
        <h2>User Info</h2>
        <p><b>Name:</b> <span id="name"></span></p>
        <p><b>Email:</b> <span id="email"></span></p>
    </div>

    <!-- ORDER HISTORY -->
    <h2 class="explore">My Orders</h2>
    <div id="orders"></div>

</div>

<script>

async function loadProfile() {

    const userId = localStorage.getItem("userId");

    document.getElementById("name").innerText = localStorage.getItem("userName");
    document.getElementById("email").innerText = localStorage.getItem("userEmail");

    const res = await fetch(`http://localhost:5000/api/orders/user/${userId}`);
    const orders = await res.json();

    const productRes = await fetch("http://localhost:5000/api/products");
    const products = await productRes.json();

    const container = document.getElementById("orders");

    container.innerHTML = "";

    orders.forEach(o => {

        const product = products.find(p => p._id === o.productId);

        container.innerHTML += `
            <div class="card">
                <h3>${product ? product.title : "Product"}</h3>
                <p>₹${product ? product.price : ""}</p>
                <p>Status: ${o.status}</p>
                <p>Payment ID: ${o.paymentId || "N/A"}</p>
            </div>
        `;
    });
}

loadProfile();

</script>

</body>
</html>
